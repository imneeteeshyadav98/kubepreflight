<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="theme.css" />
<style>
  .scene {
    background: radial-gradient(ellipse at 50% 30%, #101c1a 0%, #0a1211 70%);
    opacity: 0; transition: opacity 220ms ease;
  }
  .scene.show { opacity: 1; }
  .mark { display: flex; align-items: center; gap: 34px; margin-bottom: 22px; }
  .mark .box {
    width: 104px; height: 104px; border: 4px solid var(--accent); border-radius: 22px;
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .mark .box svg { width: 48px; height: 48px; }
  .mark .name { font-family: "Plex Sans"; font-weight: 600; font-size: 84px; letter-spacing: -0.01em; white-space: nowrap; }
  .mark .name b { color: var(--accent); }
  .mark .name .ver { color: var(--text-muted); font-weight: 500; margin-left: 20px; }
  h1 {
    font-family: "Plex Sans"; font-weight: 600; font-size: 62px; margin: 0;
    line-height: 1.25; text-align: center; color: var(--text);
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="mark">
    <div class="box"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12L10 18L20 6" stroke="#3fd9ce" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="name">Kube<b>Preflight</b><span class="ver">v1.0.0</span></div>
  </div>
  <h1>Kubernetes &amp; EKS<br />upgrade readiness</h1>
</div>
<script>
  const scene = document.getElementById('scene');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    scene.classList.add('show');
    window.sceneReady = true;
  }));
  window.fadeOut = () => scene.classList.remove('show');
</script>
</body>
</html>
