<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="theme.css" />
<style>
  .scene { background: radial-gradient(ellipse at 50% 30%, #101c1a 0%, #0a1211 70%); }
  h1 {
    font-family: "Plex Sans"; font-weight: 600; font-size: 34px; margin: 0 0 30px;
    line-height: 1.3; text-align: center; color: var(--text);
  }
  .url { font-family: "Plex Mono"; font-size: 40px; font-weight: 600; color: var(--accent); letter-spacing: -0.01em; }
  .tagline {
    margin-top: 14px; font-family: "Plex Mono"; font-size: 18px; color: var(--text-muted);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .repo { margin-top: 26px; font-family: "Plex Mono"; font-size: 15px; color: var(--text-muted); opacity: 0.75; }
</style>
</head>
<body>
<div class="scene" id="scene">
  <h1>Catch upgrade blockers<br />before production changes.</h1>
  <div class="url">kubepreflight.com</div>
  <div class="tagline">Open source &middot; Read-only</div>
  <div class="repo">github.com/imneeteeshyadav98/kubepreflight</div>
</div>
<script>
  window.sceneReady = true;
  window.fadeOut = () => document.getElementById('scene').classList.add('fade-out');
</script>
</body>
</html>
