# Copy-pasteable RBAC for kubepreflight. Every rule here is derived
# directly from what internal/collectors/k8s actually calls — no verb or
# resource is included speculatively. No "secrets" verb appears anywhere:
# none of the checks need Secret contents.
#
# Adjust the ServiceAccount's namespace in both binding subjects below to
# wherever you actually run kubepreflight from.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubepreflight
  namespace: default
  labels:
    app.kubernetes.io/name: kubepreflight
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubepreflight-scanner
  labels:
    app.kubernetes.io/name: kubepreflight
rules:
  # Nodes (NODE-001), Pods (PDB-001/PDB-002 overlap check), Services
  # (WH-002 backend health).
  - apiGroups: [""]
    resources: ["nodes", "pods", "services"]
    verbs: ["get", "list", "watch"]

  # PDB-001, PDB-002.
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]

  # WH-001, WH-002.
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch"]

  # WH-002 backend-health check reads EndpointSlices, not the legacy
  # Endpoints API.
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]

  # DaemonSet/Deployment inventory used by the collector snapshot.
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "watch"]

  # CRD-002-style CRD inventory (also feeds future storedVersions checks).
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # API-001's deprecated-API dynamic-client scan (internal/apicatalog).
  # These resources may already be entirely absent on a cluster past
  # removal — that 404 is treated as benign, not a permissions error, but
  # the grant still needs to exist for clusters where the API is still
  # served.
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["deployments", "daemonsets", "replicasets", "networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiregistration.k8s.io"]
    resources: ["apiservices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certificates.k8s.io"]
    resources: ["certificatesigningrequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["flowschemas", "prioritylevelconfigurations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.k8s.io"]
    resources: ["priorityclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csidrivers", "csinodes", "storageclasses", "volumeattachments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubepreflight-scanner
  labels:
    app.kubernetes.io/name: kubepreflight
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubepreflight-scanner
subjects:
  - kind: ServiceAccount
    name: kubepreflight
    namespace: default
---
# COREDNS-001 needs exactly one ConfigMap: kube-system/coredns. This is
# deliberately a namespace-scoped Role with resourceNames, not folded into
# the ClusterRole above — the grant can never be broadened to "any
# ConfigMap named coredns in any namespace," matching the "ConfigMap reads
# are allowlisted to known add-on configs, never blanket" principle the
# collector itself follows (a single Get, not a List).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubepreflight-coredns-configmap-reader
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kubepreflight
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["coredns"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubepreflight-coredns-configmap-reader
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kubepreflight
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubepreflight-coredns-configmap-reader
subjects:
  - kind: ServiceAccount
    name: kubepreflight
    namespace: default
