apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: payments-guard
  uid: webhook-uid-1
webhooks:
  - name: guard.payments.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    rules:
      - apiGroups: ["*"]
        apiVersions: ["*"]
        resources: ["*"]
        operations: ["*"]
    clientConfig:
      service:
        name: guard-svc
        namespace: payments
        path: /validate
