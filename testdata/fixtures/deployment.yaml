apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
  uid: deploy-uid-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: app
          image: payments-api:1.0.0
