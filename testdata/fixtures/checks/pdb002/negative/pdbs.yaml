apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: web
  uid: pdb002-neg-a-uid
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
status:
  disruptionsAllowed: 1
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: web
  uid: pdb002-neg-b-uid
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
status:
  disruptionsAllowed: 1
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-abc
  namespace: web
  uid: pdb002-neg-pod-frontend-uid
  labels:
    app: frontend
spec:
  containers:
    - name: app
      image: frontend:1.0.0
---
apiVersion: v1
kind: Pod
metadata:
  name: backend-abc
  namespace: web
  uid: pdb002-neg-pod-backend-uid
  labels:
    app: backend
spec:
  containers:
    - name: app
      image: backend:1.0.0
