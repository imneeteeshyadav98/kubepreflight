name: scorecard

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  branch_protection_rule:
  schedule:
    - cron: '41 5 * * 3'
  workflow_dispatch:

# Deliberately no write permissions at workflow level -- Scorecard's own
# publish_results verification rejects a workflow that declares id-token or
# security-events write scope globally, since that would grant that scope
# to every job the workflow might ever add, not just the analysis job that
# actually needs it. Only the scorecard job below elevates.
permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: scorecard-results.sarif
