name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  GO_VERSION: '1.25.12'
  NODE_VERSION: '22'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: go test ./...
      - run: go vet ./...
      - run: ./scripts/check-compatibility-catalog.sh
      - run: ./scripts/check-api-version-catalog.sh
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: ./scripts/check-console-dist.sh
      - run: python3 -m pip install -r web/tests/requirements.txt
      - run: python3 web/tests/browser_smoke.py
      - run: docker build -t kubepreflight:release-smoke .

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          name="kubepreflight_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          mkdir -p dist "$name"
          # Same version/commit computation the docker job uses, so
          # `kubepreflight version` and `docker run <image> version` agree
          # (REL-TRUST-002/003). GITHUB_REF_NAME keeps its "v" prefix for
          # archive naming (unchanged, existing convention); buildinfo's
          # own Version is the "v"-stripped form, matching the released
          # GHCR tag and the documented `KubePreflight 0.16.0` banner.
          version="${GITHUB_REF_NAME#v}"
          commit="${GITHUB_SHA:0:7}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/imneeteeshyadav98/kubepreflight/internal/buildinfo.Version=${version} -X github.com/imneeteeshyadav98/kubepreflight/internal/buildinfo.Commit=${commit} -X github.com/imneeteeshyadav98/kubepreflight/internal/buildinfo.BuildDate=${build_date}"
          go build -trimpath -ldflags="${ldflags}" -o "$name/kubepreflight${{ matrix.ext }}" ./cmd/kubepreflight
          cp README.md LICENSE "$name/"
          if [ "$GOOS" = "windows" ]; then
            zip -r "dist/${name}.zip" "$name"
          else
            tar -czf "dist/${name}.tar.gz" "$name"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: kubepreflight-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  docker:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute build metadata
        id: build_meta
        run: |
          set -euo pipefail
          {
            echo "version=${GITHUB_REF_NAME#v}"
            echo "commit=${GITHUB_SHA:0:7}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v7
        id: build
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build_meta.outputs.version }}
            COMMIT=${{ steps.build_meta.outputs.commit }}
            BUILD_DATE=${{ steps.build_meta.outputs.build_date }}

  scan-release-image:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan published release image and write SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.docker.outputs.image-digest }}
          format: sarif
          output: trivy-release-image.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload release image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-release-image.sarif
          category: trivy-release-image

      - name: Enforce release image vulnerability policy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.docker.outputs.image-digest }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

  github-release:
    needs:
      - binaries
      - scan-release-image
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: kubepreflight-*
          merge-multiple: true
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/kubepreflight_${{ github.ref_name }}_sbom.spdx.json
          upload-artifact: false
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > "kubepreflight_${GITHUB_REF_NAME}_checksums.txt"
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  # REL-TRUST-004 / KP-V1-INSTALL-001: everything above this point only
  # proves the binary *builds* correctly. These jobs prove the artifacts a
  # user actually installs work -- every one of them operates entirely on
  # assets fetched back from the GitHub Release or GHCR, never a `go
  # build`/local rebuild of this checkout, so they'd catch a broken
  # upload, a stale/mismatched asset, or a release-pipeline-only
  # regression that `go test` can't see. Shared logic lives in
  # scripts/release/ so these jobs stay thin and identical checks don't
  # drift into per-platform copies.
  verify-published-release-linux:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Download, verify, and extract the Linux archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bin="$(./scripts/release/verify-artifacts.sh linux_amd64 verify)"
          # Regression guard for the exact v0.17.0-install-matrix failure:
          # verify-artifacts.sh's stdout contract is exactly one line, the
          # binary path -- a second line here (e.g. a checksum tool's own
          # "OK" status message leaking onto stdout again in some future
          # edit) would silently corrupt this GITHUB_ENV write and fail in
          # a confusing way several steps later instead of right here.
          case "${bin}" in
            *$'\n'*)
              echo "verify-artifacts.sh returned more than one line -- its stdout contract is exactly one line, the binary path:" >&2
              printf '%s\n' "${bin}" >&2
              exit 1
              ;;
          esac
          echo "BIN=${bin}" >> "$GITHUB_ENV"
      - name: Deep verification (version, help, redaction, fixture scan, leak gate)
        run: ./scripts/release/verify-published-binary.sh "${BIN}" deep verify/scan-out

  verify-published-release-macos:
    needs: github-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full fixture smoke on one architecture is enough evidence that
          # the scan/redaction/report pipeline itself works cross-platform
          # -- duplicating the heavy check on both would only prove the
          # same Go code runs the same way twice, not catch a new class of
          # bug. arm64 gets the deep check as the now-default Apple
          # Silicon target; amd64 still gets a real native run, just
          # lighter (checksum/extract/version/help only).
          - runner: macos-14
            archive_arch: arm64
            mode: deep
          - runner: macos-15-intel
            archive_arch: amd64
            mode: light
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Confirm runner architecture matches the matrix entry
        run: |
          set -euo pipefail
          uname -s
          uname -m
      - name: Download, verify, and extract the darwin/${{ matrix.archive_arch }} archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bin="$(./scripts/release/verify-artifacts.sh "darwin_${{ matrix.archive_arch }}" verify)"
          # Regression guard for the exact v0.17.0-install-matrix failure --
          # see the matching comment in verify-published-release-linux.
          case "${bin}" in
            *$'\n'*)
              echo "verify-artifacts.sh returned more than one line -- its stdout contract is exactly one line, the binary path:" >&2
              printf '%s\n' "${bin}" >&2
              exit 1
              ;;
          esac
          echo "BIN=${bin}" >> "$GITHUB_ENV"
      - name: Verify (${{ matrix.mode }})
        run: ./scripts/release/verify-published-binary.sh "${BIN}" "${{ matrix.mode }}" verify/scan-out

  verify-published-release-windows:
    needs: github-release
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Download, verify, and extract the Windows archive
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $archive = "kubepreflight_${env:GITHUB_REF_NAME}_windows_amd64.zip"
          $checksums = "kubepreflight_${env:GITHUB_REF_NAME}_checksums.txt"
          New-Item -ItemType Directory -Force -Path verify | Out-Null
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --dir verify --pattern $archive --pattern $checksums
          if ($LASTEXITCODE -ne 0) { throw "gh release download failed" }

          Push-Location verify
          $expectedLine = (Get-Content $checksums | Select-String -Pattern ([regex]::Escape($archive)))
          if (-not $expectedLine) { throw "no checksum entry found for $archive" }
          $expectedHash = ($expectedLine -split '\s+')[0]
          $actualHash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          if ($actualHash -ne $expectedHash) {
            throw "checksum mismatch for ${archive}: expected $expectedHash, got $actualHash"
          }
          Pop-Location

          Expand-Archive -Path "verify/$archive" -DestinationPath verify -Force
          $binDir = "verify/kubepreflight_${env:GITHUB_REF_NAME}_windows_amd64"
          echo "BIN=$binDir/kubepreflight.exe" >> $env:GITHUB_ENV
      - name: Deep verification (version, help, redaction, fixture scan, leak gate)
        shell: pwsh
        run: ./scripts/release/verify-published-binary.ps1 -BinPath $env:BIN -Mode deep -OutDir verify/scan-out

  verify-published-container:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Both GHCR aliases exist, share one digest, and match release provenance
        run: ./scripts/release/verify-container-aliases.sh

  # go.mod's module path used to be plain "kubepreflight", not this
  # project's GitHub import path, which made `go install
  # github.com/OWNER/REPO/...@tag` fail outright -- KP-V1-INSTALL-001
  # found this; fix/public-go-module-path fixed go.mod and every internal
  # import path to match. This job proves that fix stays fixed: go install
  # must succeed, the installed binary must run, and (unlike the release
  # archives and GHCR images) its version banner is expected to show the
  # safe dev/unknown/unknown buildinfo fallback, since go install does not
  # run this repo's release-workflow -ldflags -- see
  # docs/published-install-matrix.md for why that's not faked here.
  verify-go-install:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: go install the tagged module and confirm it runs
        run: |
          set -euo pipefail
          export GOBIN="${RUNNER_TEMP}/gobin"
          mkdir -p "${GOBIN}"
          go install "github.com/${{ github.repository }}/cmd/kubepreflight@${GITHUB_REF_NAME}"
          out="$("${GOBIN}/kubepreflight" version)"
          echo "${out}"
          "${GOBIN}/kubepreflight" --version
          "${GOBIN}/kubepreflight" scan --help >/dev/null
          # Deliberately not asserting a specific version/commit/date value
          # here -- go install never runs this repo's release ldflags, so
          # the safe buildinfo.go dev/unknown fallback is the correct,
          # honest result, not a bug to assert away. Just confirm the
          # banner is well-formed (three lines).
          lines="$(echo "${out}" | wc -l)"
          if [ "${lines}" -ne 3 ]; then
            echo "expected a 3-line version banner (name, commit, built), got ${lines} lines"
            exit 1
          fi
