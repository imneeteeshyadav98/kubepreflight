name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.24.x'
  NODE_VERSION: '22'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: go test ./...
      - run: go vet ./...
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: ./scripts/check-console-dist.sh
      - run: python3 -m pip install -r web/tests/requirements.txt
      - run: python3 web/tests/browser_smoke.py
      - run: docker build -t kubepreflight:release-smoke .

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          name="kubepreflight_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          mkdir -p dist "$name"
          go build -trimpath -ldflags="-s -w" -o "$name/kubepreflight${{ matrix.ext }}" ./cmd/kubepreflight
          cp README.md LICENSE "$name/"
          if [ "$GOOS" = "windows" ]; then
            zip -r "dist/${name}.zip" "$name"
          else
            tar -czf "dist/${name}.tar.gz" "$name"
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: kubepreflight-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  docker:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    needs:
      - binaries
      - docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/kubepreflight_${{ github.ref_name }}_sbom.spdx.json
          upload-artifact: false
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > kubepreflight_${GITHUB_REF_NAME}_checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
