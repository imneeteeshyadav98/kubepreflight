name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  GO_VERSION: '1.25.12'
  NODE_VERSION: '22'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: go test ./...
      - run: go vet ./...
      - run: ./scripts/check-compatibility-catalog.sh
      - run: ./scripts/check-api-version-catalog.sh
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: ./scripts/check-console-dist.sh
      - run: python3 -m pip install -r web/tests/requirements.txt
      - run: python3 web/tests/browser_smoke.py
      - run: docker build -t kubepreflight:release-smoke .

  binaries:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          name="kubepreflight_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          mkdir -p dist "$name"
          # Same version/commit computation the docker job uses, so
          # `kubepreflight version` and `docker run <image> version` agree
          # (REL-TRUST-002/003). GITHUB_REF_NAME keeps its "v" prefix for
          # archive naming (unchanged, existing convention); buildinfo's
          # own Version is the "v"-stripped form, matching the released
          # GHCR tag and the documented `KubePreflight 0.16.0` banner.
          version="${GITHUB_REF_NAME#v}"
          commit="${GITHUB_SHA:0:7}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X kubepreflight/internal/buildinfo.Version=${version} -X kubepreflight/internal/buildinfo.Commit=${commit} -X kubepreflight/internal/buildinfo.BuildDate=${build_date}"
          go build -trimpath -ldflags="${ldflags}" -o "$name/kubepreflight${{ matrix.ext }}" ./cmd/kubepreflight
          cp README.md LICENSE "$name/"
          if [ "$GOOS" = "windows" ]; then
            zip -r "dist/${name}.zip" "$name"
          else
            tar -czf "dist/${name}.tar.gz" "$name"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: kubepreflight-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  docker:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute build metadata
        id: build_meta
        run: |
          set -euo pipefail
          {
            echo "version=${GITHUB_REF_NAME#v}"
            echo "commit=${GITHUB_SHA:0:7}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v7
        id: build
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build_meta.outputs.version }}
            COMMIT=${{ steps.build_meta.outputs.commit }}
            BUILD_DATE=${{ steps.build_meta.outputs.build_date }}

  scan-release-image:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan published release image and write SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.docker.outputs.image-digest }}
          format: sarif
          output: trivy-release-image.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload release image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-release-image.sarif
          category: trivy-release-image

      - name: Enforce release image vulnerability policy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.docker.outputs.image-digest }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

  github-release:
    needs:
      - binaries
      - scan-release-image
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: kubepreflight-*
          merge-multiple: true
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/kubepreflight_${{ github.ref_name }}_sbom.spdx.json
          upload-artifact: false
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > "kubepreflight_${GITHUB_REF_NAME}_checksums.txt"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # REL-TRUST-004: everything above this point only proves the binary
  # *builds* correctly. This job proves the artifact a user actually
  # downloads from the published release works -- it operates entirely on
  # the asset fetched back from the GitHub Release via `gh release
  # download`, never a `go build` of this checkout, so it would catch a
  # broken upload, a stale/mismatched asset, or a ldflags regression that
  # only shows up in the release pipeline and not in `go test`.
  verify-published-release:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p verify
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --dir verify \
            --pattern "kubepreflight_${GITHUB_REF_NAME}_linux_amd64.tar.gz" \
            --pattern "kubepreflight_${GITHUB_REF_NAME}_checksums.txt" \
            --pattern "kubepreflight_${GITHUB_REF_NAME}_sbom.spdx.json"

      - name: Verify checksum of the downloaded archive
        run: |
          set -euo pipefail
          cd verify
          grep "linux_amd64.tar.gz" "kubepreflight_${GITHUB_REF_NAME}_checksums.txt" | sha256sum -c -

      - name: Confirm SBOM asset exists and parses as JSON
        run: |
          set -euo pipefail
          sbom="verify/kubepreflight_${GITHUB_REF_NAME}_sbom.spdx.json"
          test -s "$sbom"
          python3 -c "import json; json.load(open('${sbom}'))"

      - name: Extract the downloaded binary
        run: |
          set -euo pipefail
          tar -xzf "verify/kubepreflight_${GITHUB_REF_NAME}_linux_amd64.tar.gz" -C verify
          chmod +x "verify/kubepreflight_${GITHUB_REF_NAME}_linux_amd64/kubepreflight"
          echo "BIN=$GITHUB_WORKSPACE/verify/kubepreflight_${GITHUB_REF_NAME}_linux_amd64/kubepreflight" >> "$GITHUB_ENV"

      - name: Version banner matches this release (REL-TRUST-002/003)
        run: |
          set -euo pipefail
          expected="KubePreflight ${GITHUB_REF_NAME#v}"
          out="$("$BIN" version)"
          echo "$out"
          [ "$(echo "$out" | head -n1)" = "$expected" ] || { echo "want first line %q, got: $out" "$expected"; exit 1; }
          echo "$out" | grep -q "^commit: unknown$" && { echo "commit is 'unknown' -- ldflags did not reach the published binary"; exit 1; }
          echo "$out" | grep -q "^built: unknown$" && { echo "built date is 'unknown' -- ldflags did not reach the published binary"; exit 1; }
          # --version (Cobra's auto flag) must print the identical banner.
          diff <("$BIN" --version) <(echo "$out")

      - name: Redaction flag present on all five surfaces
        run: |
          set -euo pipefail
          for cmd_args in "scan" "plan" "rollback plan" "rollback assess" "compare"; do
            # Word-splitting is required here: "rollback plan" must become
            # two args (rollback, plan), not one.
            # shellcheck disable=SC2086
            if ! "$BIN" $cmd_args --help | grep -q -- "--redact-sensitive-identifiers"; then
              echo "missing --redact-sensitive-identifiers on: kubepreflight $cmd_args"
              exit 1
            fi
          done

      - name: Deterministic fixture scan on the downloaded binary
        run: |
          set -euo pipefail
          mkdir -p verify/scan-out
          set +e
          "$BIN" scan \
            --target-version 1.34 \
            --manifests-only \
            --manifests testdata/manifest-repo/raw \
            --output all \
            --output-dir verify/scan-out \
            --redact-sensitive-identifiers \
            --serve-report never \
            --terminal-output silent
          code=$?
          set -e
          # testdata/manifest-repo/raw/psp.yaml is a removed-API (policy/v1beta1
          # PodSecurityPolicy) positive fixture -- same one scan_test.go locks a
          # BLOCKED verdict to -- so this scan must always exit 2, deterministically.
          if [ "$code" -ne 2 ]; then
            echo "expected exit code 2 (BLOCKED) scanning the removed-API fixture, got $code"
            exit 1
          fi

      - name: Confirm expected output files exist and findings.json parses
        run: |
          set -euo pipefail
          for f in findings.json report.md report.html; do
            test -s "verify/scan-out/$f" || { echo "missing verify/scan-out/$f"; exit 1; }
          done
          python3 -c "import json; json.load(open('verify/scan-out/findings.json'))"
