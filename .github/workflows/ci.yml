name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: go test ./...
      - run: go vet ./...
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - run: ./scripts/check-console-dist.sh
      - run: python3 -m pip install -r web/tests/requirements.txt
      - run: python3 web/tests/browser_smoke.py
      - run: docker build -t kubepreflight:ci .
